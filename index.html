      const raw = (el.textContent || '').trim();
      if (!raw) return;
      // Title-case common section headers if ALL CAPS
      if (raw === raw.toUpperCase() && raw.length > 2 && /[A-Z]/.test(raw) && raw.length < 40) {
        el.textContent = raw.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
      }
    });
  }

  // Ensure prospecting cell backgrounds are not wiped — store and re-apply if needed
  function lockTintedBackgrounds() {
    const main = document.querySelector('main');
    if (!main) return;
    const cells = main.querySelectorAll('.border.rounded-xl.overflow-hidden.bg-white.flex > .flex-1, .border.border-slate-200.rounded-xl.overflow-hidden > .flex-1');
    cells.forEach((cell) => {
      const bg = cell.style.backgroundColor || getComputedStyle(cell).backgroundColor;
      if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') {
        cell.dataset.rTint = bg;
        // re-assert as inline so later CSS doesn't kill it (we don't set bg in CSS on these)
        cell.style.backgroundColor = bg;
      }
    });
  }

  function boot() {
    ensureStyle();
    polishSectionLabels();
    lockTintedBackgrounds();
    // one more pass after late layout
    setTimeout(() => { polishSectionLabels(); lockTintedBackgrounds(); }, 200);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>

  function setupMetricsTitle() {
    const h2 = Array.from(document.querySelectorAll('h2')).find(h => /Metrics Activity/i.test(h.textContent || ''));
    const titleRow = h2?.parentElement;
    if (!h2 || !titleRow) return;

    titleRow.style.setProperty('display', 'flex', 'important');
    titleRow.style.setProperty('align-items', 'center', 'important');
    titleRow.style.setProperty('gap', '0', 'important');

    let cluster = document.getElementById('aside-metrics-title-cluster');
    if (!cluster) {
      cluster = document.createElement('div');
      cluster.id = 'aside-metrics-title-cluster';
      titleRow.insertBefore(cluster, titleRow.firstChild);
    }
    cluster.style.cssText = 'display:inline-flex;align-items:center;gap:8px;height:24px;';
    const icon = titleRow.querySelector('svg');
    if (icon && icon.parentElement !== cluster) cluster.appendChild(icon);
    if (h2.parentElement !== cluster) cluster.appendChild(h2);
    if (icon) {
      icon.style.setProperty('width', '16px', 'important');
      icon.style.setProperty('height', '16px', 'important');
      icon.style.setProperty('display', 'block', 'important');
    }
    h2.style.setProperty('margin', '0', 'important');
    h2.style.setProperty('line-height', '16px', 'important');
    h2.style.setProperty('display', 'inline-flex', 'important');
    h2.style.setProperty('align-items', 'center', 'important');

    let meta = document.getElementById('aside-metrics-title-meta');
    if (!meta) {
      meta = document.createElement('div');
      meta.id = 'aside-metrics-title-meta';
      cluster.insertAdjacentElement('afterend', meta);
    }
    meta.style.cssText = 'display:inline-flex;align-items:center;flex-wrap:wrap;min-height:24px;';
  }

  function mkSep() {
    const sep = document.createElement('span');
    sep.setAttribute('aria-hidden', 'true');
    sep.style.cssText = `display:inline-block;width:1px;height:12px;background:${T.border};margin:0 8px;flex-shrink:0;align-self:center;`;
    return sep;
  }

  function renderFilters() {
    hideHeaderChips();
    document.querySelectorAll('[data-aside-filter-card]').forEach(el => {
      const dim = el.getAttribute('data-aside-filter-card');
      const label = el.getAttribute('data-aside-filter-label');
      const selected = (dim === 'stage' && state.stage === label) || (dim === 'signal' && state.signal === label);
      el.setAttribute('data-aside-selected', selected ? 'true' : 'false');
    });

    const meta = document.getElementById('aside-metrics-title-meta');
    if (meta) {
      meta.innerHTML = '';
      const parts = [];
      if (state.stage) parts.push(`Showing Stage · <strong style="color:${T.fg};font-weight:600">${state.stage}</strong>`);
      if (state.signal) parts.push(`Client · <strong style="color:${T.fg};font-weight:600">${state.signal}</strong>`);
      if (!parts.length) parts.push(`Showing <strong style="color:${T.fg};font-weight:600">all activity</strong>`);
      parts.forEach(html => {
        meta.appendChild(mkSep());
        const seg = document.createElement('span');
        seg.style.cssText = `display:inline-flex;align-items:center;gap:4px;height:24px;font-size:12px;font-weight:500;color:${T.muted};line-height:16px;white-space:nowrap;`;
        // Parse "Label <strong>value</strong>" into separate flex children so spaces don't collapse
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        const strong = tmp.querySelector('strong');
        if (strong) {
          const value = (strong.textContent || '').trim();
          strong.remove();
          let prefix = (tmp.textContent || '').replace(/\s+/g, ' ').trim();
          if (!prefix) prefix = 'Showing';
          const lab = document.createElement('span');
          lab.textContent = prefix;
          const s = document.createElement('strong');
          s.textContent = value;
          s.style.cssText = `color:${T.fg};font-weight:600`;
          seg.appendChild(lab);
          seg.appendChild(s);
        } else {
          seg.textContent = (tmp.textContent || '').trim();
        }
        meta.appendChild(seg);
      });
    }

    const allActivity = Array.from(document.querySelectorAll('button')).find(
      b => /All Activity/i.test((b.textContent || '').trim()) && b.getAttribute('aria-haspopup') === 'menu'
    );
    const toolbar = allActivity?.parentElement;
    if (!toolbar) return;

    let group = document.getElementById('aside-activity-filter-group');
    if (!group) {
      group = document.createElement('div');
      group.id = 'aside-activity-filter-group';
      toolbar.appendChild(group);
    }
    group.style.cssText = 'display:inline-flex;align-items:center;gap:0;margin-left:auto;height:28px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';

    let countText = null;
    toolbar.querySelectorAll('span, div, p').forEach(el => {
      if (group.contains(el)) return;
      const t = (el.textContent || '').replace(/\s+/g, ' ').trim();
      if (/^\d+\s*events?$/i.test(t) && el.childElementCount === 0) {
        if (!countText) countText = t;
        el.style.setProperty('display', 'none', 'important');
        el.setAttribute('data-aside-real-events', t);
      }
    });
    // collapse leftover visible event labels
    toolbar.querySelectorAll('*').forEach(el => {
      if (group.contains(el) || el === group) return;
      const r = el.getBoundingClientRect();
      if (r.width > 0 && r.width < 100 && r.height > 0 && el.childElementCount === 0) {
        const t = (el.textContent || '').replace(/\s+/g, ' ').trim();
        if (/^\d+\s*events?$/i.test(t)) {
          if (!countText) countText = t;
          el.style.setProperty('display', 'none', 'important');
        }
      }
    });
    if (!countText) {
      countText = document.querySelector('[data-aside-real-events]')?.getAttribute('data-aside-real-events') || '10 events';
    }

    group.innerHTML = '';
    const events = document.createElement('span');
    events.style.cssText = `font-size:12px;font-weight:500;color:${T.muted};white-space:nowrap;`;
    events.textContent = countText;
    group.appendChild(events);

    const mkChip = (dim, prefix, label) => {
      const chip = document.createElement('span');
      chip.style.cssText = `display:inline-flex;align-items:center;gap:4px;height:24px;padding:0 6px 0 8px;border-radius:6px;background:${T.primarySoft};border:1px solid ${T.primaryBorder};font-size:12px;font-weight:500;color:${T.primary};white-space:nowrap;`;
      const t = document.createElement('span');
      t.textContent = `${prefix} · ${label}`;
      const x = document.createElement('button');
      x.type = 'button';
      x.textContent = '×';
      x.style.cssText = `border:0;background:transparent;color:${T.muted};cursor:pointer;font-size:12px;width:14px;height:14px;padding:0;`;
      x.addEventListener('click', (e) => {
        e.stopPropagation();
        if (dim === 'stage') state.stage = null;
        else state.signal = null;
        renderFilters();
      });
      chip.appendChild(t);
      chip.appendChild(x);
      return chip;
    };

    if (state.stage || state.signal) {
      group.appendChild(mkSep());
      if (state.stage) group.appendChild(mkChip('stage', 'Stage', state.stage));
      if (state.stage && state.signal) group.appendChild(mkSep());
      if (state.signal) group.appendChild(mkChip('signal', 'Client', state.signal));
      group.appendChild(mkSep());
      const clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.textContent = 'Clear';
      clearBtn.style.cssText = `height:24px;padding:0 6px;border:0;background:transparent;font-size:12px;font-weight:600;color:${T.destructive};cursor:pointer;`;
      clearBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        state.stage = null;
        state.signal = null;
        renderFilters();
      });
      group.appendChild(clearBtn);
    }
  }

  function wireClicks() {
    if (window.__asideMelFilterClickWired) return;
    window.__asideMelFilterClickWired = true;
    document.addEventListener('click', (e) => {
      if (e.target.closest('#aside-activity-filter-group')) return;
      const card = e.target.closest?.('[data-aside-filter-card]');
      if (!card) return;
      const dim = card.getAttribute('data-aside-filter-card');
      const label = card.getAttribute('data-aside-filter-label');
      // single-select within dimension; multi across
      if (dim === 'stage') state.stage = state.stage === label ? null : label;
      else state.signal = state.signal === label ? null : label;
      renderFilters();
    }, true);
  }

  // Metrics Activity: no scroll cage; show full list up to 10, then View all expands.
  const ACTIVITY_PREVIEW = 10;
  if (typeof window.__asideActivityExpanded === 'undefined') window.__asideActivityExpanded = false;

  function findActivityList() {
    const h2 = Array.from(document.querySelectorAll('h2')).find(h => /Metrics Activity/i.test(h.textContent || ''));
    if (!h2) return null;
    let section = h2.parentElement;
    for (let i = 0; i < 6 && section; i++) {
      if ((section.textContent || '').includes('All Activity')) break;
      section = section.parentElement;
    }
    const root = section || h2.closest('div') || document.querySelector('main');
    // preferred: max-h scroll cage
    let list = root.querySelector('[class*="max-h-[320px]"]');
    if (!list) {
      list = Array.from(root.querySelectorAll('div')).find(d => {
        const c = d.className?.toString?.() || '';
        return c.includes('overflow-y-auto') && c.includes('max-h');
      });
    }
    if (!list) {
      // timeline container fallback
      const timeline = root.querySelector('[class*="border-l"][class*="space-y-4"]');
      list = timeline?.parentElement || null;
    }
    return list;
  }

  function setupMetricsActivityList() {
    const list = findActivityList();
    if (!list) return;

    list.setAttribute('data-aside-activity-list', '1');
    // kill scroll cage
    list.style.setProperty('max-height', 'none', 'important');
    list.style.setProperty('overflow', 'visible', 'important');
    list.style.setProperty('overflow-y', 'visible', 'important');
    list.classList.remove('overflow-y-auto');
    // strip max-h utility if present in class string
    if (list.className && typeof list.className === 'string') {
      list.className = list.className
        .split(/\s+/)
        .filter(c => c && !c.startsWith('max-h') && c !== 'overflow-y-auto')
        .join(' ');
    }

    const timeline = list.querySelector('[class*="border-l"][class*="space-y"]') || list.firstElementChild;
    if (!timeline) return;
    const items = Array.from(timeline.children).filter(el => el.tagName === 'DIV');
    items.forEach((el, i) => el.setAttribute('data-aside-activity-item', String(i)));

    const total = items.length;
    const expanded = !!window.__asideActivityExpanded;
    const needsCollapse = total > ACTIVITY_PREVIEW;

    items.forEach((el, i) => {
      if (needsCollapse && !expanded && i >= ACTIVITY_PREVIEW) {
        el.setAttribute('data-aside-hidden', '1');
        el.style.setProperty('display', 'none', 'important');
      } else {
        el.removeAttribute('data-aside-hidden');
        el.style.removeProperty('display');
      }
    });

    // View all footer lives on the card (parent of list), not inside scroll area
    const card = list.parentElement;
    if (!card) return;
    let btn = document.getElementById('aside-activity-view-all');
    if (!needsCollapse) {
      if (btn) btn.remove();
      return;
    }
    if (!btn) {
      btn = document.createElement('button');
      btn.type = 'button';
      btn.id = 'aside-activity-view-all';
      card.appendChild(btn);
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        window.__asideActivityExpanded = !window.__asideActivityExpanded;
        setupMetricsActivityList();
      });
    }
    // keep at end of card
    if (btn.parentElement === card && card.lastElementChild !== btn) {
      card.appendChild(btn);
    }
    const hidden = Math.max(0, total - ACTIVITY_PREVIEW);
    if (expanded) {
      btn.setAttribute('data-expanded', '1');
      btn.textContent = 'Show less';
      btn.setAttribute('aria-expanded', 'true');
    } else {
      btn.setAttribute('data-expanded', '0');
      btn.textContent = hidden > 0 ? `View all (${total} events)` : 'View all';
      btn.setAttribute('aria-expanded', 'false');
    }
  }

  function fixPriorityBadge() {
    const h2 = Array.from(document.querySelectorAll('h2')).find(h => /Top Priority Clients/i.test(h.textContent || ''));
    if (!h2 || !h2.parentElement) return;
    const badge = Array.from(h2.parentElement.querySelectorAll('div,span')).find(el =>
      /^\d+\s*active$/i.test((el.textContent || '').trim())
    );
    if (!badge) return;
    badge.setAttribute('data-aside-priority-badge', '1');
    const set = (p, v) => badge.style.setProperty(p, v, 'important');
    set('display', 'inline-flex');
    set('align-items', 'center');
    set('height', '20px');
    set('padding', '0 8px');
    set('border-radius', '9999px');
    set('border', '1px solid #E5E5E5');
    set('background', '#F5F5F5');
    set('background-color', '#F5F5F5');
    set('color', '#525252');
    set('font-size', '11px');
    set('font-weight', '600');
    set('letter-spacing', '0.01em');
    set('text-transform', 'none');
    set('line-height', '16px');
    set('box-shadow', 'none');
    set('margin-left', '4px');
    badge.classList.remove('bg-secondary', 'text-secondary-foreground');
  }


  function styleSelectTrigger(btn) {
    if (!btn || btn.tagName !== 'BUTTON') return;
    const set = (p, v) => btn.style.setProperty(p, v, 'important');
    set('height', '32px');
    set('min-height', '32px');
    set('max-height', '32px');
    set('padding', '0 12px');
    set('border-radius', '8px');
    set('border', '1px solid #E5E5E5');
    set('background', '#FFFFFF');
    set('box-shadow', 'none');
    set('font-size', '14px');
    set('font-weight', '500');
    set('line-height', '20px');
    set('gap', '8px');
    set('color', '#0A0A0A');
    btn.querySelectorAll('svg').forEach((svg) => {
      svg.style.setProperty('width', '16px', 'important');
      svg.style.setProperty('height', '16px', 'important');
      svg.style.setProperty('flex-shrink', '0', 'important');
    });
  }

  function unifyAllSelectTriggers() {
    document.querySelectorAll('main button[aria-haspopup="menu"], main button[aria-haspopup="listbox"], #aside-campaign-filter-trigger').forEach(styleSelectTrigger);
    // open menus
    document.querySelectorAll('[role="menu"], [data-radix-menu-content], [data-radix-dropdown-menu-content], #aside-campaign-filter-panel').forEach((el) => {
      el.style.setProperty('border-radius', '8px', 'important');
      el.style.setProperty('box-shadow', 'none', 'important');
      el.style.setProperty('border', '1px solid #E5E5E5', 'important');
      el.style.setProperty('background', '#FFFFFF', 'important');
    });
  }

  function boot() {
    ensureStyle();
    unifyAllSelectTriggers();
    hideTitleBlock();
    setupToolbar();
    maintainToolbarRight();
    setupReportingToggle();
    setupSectionCaptions();
    tagCards();
    setupMetricsTitle();
    wireClicks();
    renderFilters();
    fixPriorityBadge();
    setupMetricsActivityList();
    unifyAllSelectTriggers();
  }

  function schedule() {
    boot();
    // React/MagicPath late hydration
    [100, 300, 600, 1000, 2000, 4000].forEach((ms) => setTimeout(boot, ms));

    // Re-apply when React rewrites DOM
    if (!window.__asideMelObserver) {
      let t = null;
      window.__asideMelObserver = new MutationObserver(() => {
        if (t) clearTimeout(t);
        t = setTimeout(boot, 80);
      });
      const root = document.querySelector('main') || document.body;
      window.__asideMelObserver.observe(root, { childList: true, subtree: true });
    }
  }

  // Allow re-entry on later boots: only style/script flag stays; structural ops are idempotent
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', schedule);
  else schedule();
})();
</script>

        width: 140px;
        height: 12px;
        margin: 0 0 12px;
        border-radius: 6px;
      }
      .aside-camp-skel-kpi-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }
      @media (max-width: 1100px) {
        .aside-camp-skel-kpi-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }
      .aside-camp-skel-kpi {
        height: 96px;
        border: 1px solid #E5E5E5;
        border-radius: 14px;
        background: #FFFFFF;
        padding: 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .aside-camp-skel-kpi .l { width: 48%; height: 10px; border-radius: 6px; }
      .aside-camp-skel-kpi .n { width: 36%; height: 22px; border-radius: 6px; margin-top: auto; }
      .aside-camp-skel-kpi .s { width: 40%; height: 8px; border-radius: 6px; }
      .aside-camp-skel-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }
      @media (max-width: 1100px) {
        .aside-camp-skel-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }
      .aside-camp-skel-card {
        height: 88px;
        border: 1px solid #E5E5E5;
        border-radius: 14px;
        background: #FFFFFF;
        padding: 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .aside-camp-skel-card .l { width: 42%; height: 10px; }
      .aside-camp-skel-card .n { width: 28%; height: 20px; margin-top: auto; }
      .aside-camp-skel-list {
        border: 1px solid #E5E5E5;
        border-radius: 14px;
        background: #FFFFFF;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .aside-camp-skel-list-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .aside-camp-skel-avatar {
        width: 32px;
        height: 32px;
        border-radius: 9999px;
        flex-shrink: 0;
      }
      .aside-camp-skel-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }
      .aside-camp-skel-lines .a { width: 38%; height: 10px; }
      .aside-camp-skel-lines .b { width: 62%; height: 8px; }
    `;
  }

  function currentCampaign() {
    return CAMPAIGNS.find((c) => c.id === state.campaignId) || CAMPAIGNS[0];
  }

  function chevronSvg() {
    return `<svg id="aside-campaign-filter-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function checkSvg() {
    return `<svg class="aside-campaign-item-check" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3.5 8.5l3 3 6-6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function searchSvg() {
    return `<svg id="aside-campaign-filter-search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  }

  function ensureMount() {
    ensureStyle();
    let root = document.getElementById('aside-campaign-filter');
    if (!root) {
      root = document.createElement('div');
      root.id = 'aside-campaign-filter';
      root.innerHTML = `
        <button type="button" id="aside-campaign-filter-trigger" aria-haspopup="listbox" aria-expanded="false">
          <span id="aside-campaign-filter-label">All campaigns</span>
          ${chevronSvg()}
        </button>
        <div id="aside-campaign-filter-panel" role="listbox" aria-label="AI campaigns">
          <div id="aside-campaign-filter-search-wrap">
            <div id="aside-campaign-filter-search-box">
              ${searchSvg()}
              <input id="aside-campaign-filter-search" type="text" placeholder="Search campaigns…" autocomplete="off" spellcheck="false" />
            </div>
          </div>
          <div id="aside-campaign-filter-list"></div>
        </div>
      `;
      wireRoot(root);
    }
    placeInToolbar(root);
    syncTrigger();
    if (state.open) renderList();
    return root;
  }

  function placeInToolbar(root) {
    const right = document.querySelector('[data-aside-toolbar-right="1"]');
    if (right) {
      // Campaign first in right cluster (before date)
      if (root.parentElement !== right || right.firstElementChild !== root) {
        right.insertBefore(root, right.firstChild);
      }
      return;
    }
    // fallback: near date button
    const dateBtn = Array.from(document.querySelectorAll('button[aria-haspopup="menu"]')).find((b) =>
      /This Month|Last 7|Last 30|Today/i.test(b.textContent || '')
    );
    if (dateBtn && dateBtn.parentElement) {
      const parent = dateBtn.parentElement;
      if (root.parentElement !== parent) parent.insertBefore(root, dateBtn);
    }
  }

  function wireRoot(root) {
    if (root.__wired) return;
    root.__wired = true;
    const trigger = root.querySelector('#aside-campaign-filter-trigger');
    const panel = root.querySelector('#aside-campaign-filter-panel');
    const search = root.querySelector('#aside-campaign-filter-search');

    trigger.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      state.open = !state.open;
      if (state.open) {
        state.query = '';
        search.value = '';
        renderList();
        setTimeout(() => search.focus(), 0);
      }
      syncTrigger();
    });

    search.addEventListener('input', () => {
      state.query = search.value || '';
      renderList();
    });
    search.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        state.open = false;
        syncTrigger();
        trigger.focus();
      }
      e.stopPropagation();
    });
    search.addEventListener('click', (e) => e.stopPropagation());

    document.addEventListener(
      'click',
      (e) => {
        if (!state.open) return;
        if (root.contains(e.target)) return;
        state.open = false;
        syncTrigger();
      },
      true
    );

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state.open) {
        state.open = false;
        syncTrigger();
      }
    });
  }

  function syncTrigger() {
    const trigger = document.getElementById('aside-campaign-filter-trigger');
    const panel = document.getElementById('aside-campaign-filter-panel');
    const label = document.getElementById('aside-campaign-filter-label');
    if (!trigger || !panel || !label) return;
    const c = currentCampaign();
    label.textContent = c.name;
    trigger.setAttribute('data-open', state.open ? '1' : '0');
    trigger.setAttribute('data-filtered', state.campaignId === 'all' ? '0' : '1');
    trigger.setAttribute('aria-expanded', state.open ? 'true' : 'false');
    panel.setAttribute('data-open', state.open ? '1' : '0');
    document.documentElement.setAttribute('data-campaign-id', state.campaignId);
    const main = document.querySelector('main');
    if (main) main.setAttribute('data-campaign-filtered', state.campaignId === 'all' ? '0' : '1');
  }

  function renderList() {
    const list = document.getElementById('aside-campaign-filter-list');
    if (!list) return;
    const q = (state.query || '').trim().toLowerCase();
    const items = CAMPAIGNS.filter((c) => {
      if (!q) return true;
      if (c.id === 'all') return 'all campaigns'.includes(q) || 'all'.includes(q);
      return c.name.toLowerCase().includes(q);
    });
    if (!items.length) {
      list.innerHTML = `<div id="aside-campaign-filter-empty">No campaigns found</div>`;
      return;
    }
    list.innerHTML = items
      .map((c) => {
        const sel = c.id === state.campaignId ? '1' : '0';
        return `<button type="button" class="aside-campaign-item" role="option" data-id="${c.id}" data-selected="${sel}" aria-selected="${sel === '1'}">
          <span>${escapeHtml(c.name)}</span>
          ${checkSvg()}
        </button>`;
      })
      .join('');
    list.querySelectorAll('.aside-campaign-item').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        selectCampaign(btn.getAttribute('data-id'));
      });
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function selectCampaign(id) {
    const next = id || 'all';
    const same = next === state.campaignId;
    state.campaignId = next;
    state.open = false;
    syncTrigger();
    if (same) {
      applyCampaignFilter();
      return;
    }
    // Brief skeleton while campaign metrics "load" — under 1s
    runCampaignSkeletonLoad();
  }

  function ensureCampaignBodyMark() {
    const main = document.querySelector('main');
    if (!main) return null;
    // Mark metric body siblings after toolbar/header row so skeleton can hide them
    const kids = Array.from(main.children);
    kids.forEach((el) => {
      if (el.id === 'aside-campaign-skel-root') return;
      if (el.id === 'radius-reporting-inpage') return;
      // keep top reporting chrome + first toolbar row visible
      const isToolbarish =
        el.querySelector?.('[data-aside-toolbar-ready="1"]') ||
        el.querySelector?.('#radius-scope-tabs') ||
        el.querySelector?.('#aside-campaign-filter') ||
        /Reporting/i.test(el.textContent || '') && el.querySelector?.('[role="tablist"]');
      // Heuristic: hide large content blocks under header
      if (el.querySelector?.('h2') || el.querySelector?.('[aria-label="Deal Progression"]') || el.querySelector?.('.grid')) {
        el.setAttribute('data-aside-campaign-body', '1');
      }
    });
    // Broader: anything after reporting inject that isn't skel
    let seenTabs = false;
    kids.forEach((el) => {
      if (el.id === 'aside-campaign-skel-root') return;
      if (el.id === 'radius-reporting-inpage' || el.querySelector?.('#radius-reporting-inpage')) {
        seenTabs = true;
        return;
      }
      if (el.querySelector?.('[data-aside-toolbar-ready="1"]') || el.querySelector?.('#aside-campaign-filter')) {
        seenTabs = true;
        return;
      }
      if (seenTabs && el.id !== 'aside-campaign-skel-root') {
        // Don't hide if it's only the toolbar row
        if (el.querySelector?.('[data-aside-toolbar-ready="1"]') && !el.querySelector?.('h2')) return;
        if (el.querySelector?.('h2, h3, [aria-label="Deal Progression"], [aria-label="Client Activity Triggers"]') ||
            (el.textContent || '').match(/Prospecting|Deal Progression|Metrics Activity|Top Priority/i)) {
          el.setAttribute('data-aside-campaign-body', '1');
        }
      }
    });
    return main;
  }

  function skelBlock(cls) {
    return `<div class="aside-camp-skel-pulse ${cls}"></div>`;
  }

  function ensureSkeletonRoot() {
    const main = document.querySelector('main');
    if (!main) return null;
    let root = document.getElementById('aside-campaign-skel-root');
    if (!root) {
      root = document.createElement('div');
      root.id = 'aside-campaign-skel-root';
      root.setAttribute('aria-hidden', 'true');
      root.innerHTML = `
        <div class="aside-camp-skel-section">
          ${skelBlock('aside-camp-skel-label')}
          <div class="aside-camp-skel-kpi-grid">
            ${Array.from({ length: 5 }).map(() => `
              <div class="aside-camp-skel-kpi">
                ${skelBlock('l')}
                ${skelBlock('n')}
                ${skelBlock('s')}
              </div>`).join('')}
          </div>
        </div>
        <div class="aside-camp-skel-section">
          ${skelBlock('aside-camp-skel-label')}
          <div class="aside-camp-skel-row">
            ${Array.from({ length: 5 }).map(() => `
              <div class="aside-camp-skel-card">
                ${skelBlock('l')}
                ${skelBlock('n')}
              </div>`).join('')}
          </div>
        </div>
        <div class="aside-camp-skel-section">
          ${skelBlock('aside-camp-skel-label')}
          <div class="aside-camp-skel-row" style="grid-template-columns:repeat(6,minmax(0,1fr))">
            ${Array.from({ length: 6 }).map(() => `
              <div class="aside-camp-skel-card">
                ${skelBlock('l')}
                ${skelBlock('n')}
              </div>`).join('')}
          </div>
        </div>
        <div class="aside-camp-skel-section">
          ${skelBlock('aside-camp-skel-label')}
          <div class="aside-camp-skel-list">
            ${Array.from({ length: 5 }).map(() => `
              <div class="aside-camp-skel-list-row">
                ${skelBlock('aside-camp-skel-avatar')}
                <div class="aside-camp-skel-lines">
                  ${skelBlock('a')}
                  ${skelBlock('b')}
                </div>
              </div>`).join('')}
          </div>
        </div>
      `;
    }
    // Place skeleton after toolbar / reporting header
    const toolbar = main.querySelector('[data-aside-toolbar-ready="1"]');
    const toolbarRow = toolbar?.closest?.(':scope > *') || toolbar?.parentElement;
    if (toolbarRow && toolbarRow.parentElement === main) {
      if (toolbarRow.nextSibling !== root) {
        toolbarRow.insertAdjacentElement('afterend', root);
      }
    } else if (!root.parentElement) {
      main.appendChild(root);
    }
    return root;
  }

  function runCampaignSkeletonLoad() {
    const main = document.querySelector('main');
    if (!main) {
      applyCampaignFilter();
      return;
    }
    ensureCampaignBodyMark();
    ensureSkeletonRoot();
    if (state._skelTimer) {
      clearTimeout(state._skelTimer);
      state._skelTimer = null;
    }
    main.setAttribute('data-aside-campaign-loading', '1');
    // 450–700ms, always under 1s
    const ms = 480 + Math.floor(Math.random() * 180);
    state._skelTimer = setTimeout(() => {
      state._skelTimer = null;
      applyCampaignFilter();
      main.removeAttribute('data-aside-campaign-loading');
    }, ms);
  }

  function weight() {
    return WEIGHTS[state.campaignId] ?? 1;
  }

  function scaleInt(n, w, seed) {
    if (w >= 0.999) return n;
    // slight per-seed variance so cards don't all look identical ratios
    const f = 0.85 + ((seed % 7) / 7) * 0.3; // 0.85–1.15
    return Math.max(0, Math.round(n * w * f));
  }

  function isBigMetricNumber(el) {
    if (!el || el.closest('#aside-campaign-filter')) return false;
    if (el.closest('button[aria-haspopup="menu"]')) return false;
    if (el.closest('#radius-reporting-inpage')) return false;
    if (el.closest('nav')) return false;
    if (el.closest('#radius-side-panel')) return false;
    const text = (el.textContent || '').trim();
    if (!/^\d{1,4}([,.]\d+)?%?$/.test(text) && !/^\d{1,3}(,\d{3})+$/.test(text)) return false;
    // only large-ish display numbers
    const style = window.getComputedStyle(el);
    const fs = parseFloat(style.fontSize || '0');
    if (fs < 16) return false;
    // skip years-looking
    if (/^20\d{2}$/.test(text)) return false;
    return true;
  }

  function collectMetricNodes() {
    const main = document.querySelector('main');
    if (!main) return [];
    const nodes = [];
    const walk = (root) => {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT, null);
      let n = walker.currentNode;
      while (n) {
        // leaf-ish text holders
        if (n.childElementCount === 0 && isBigMetricNumber(n)) {
          nodes.push(n);
        } else if (
          n.childElementCount === 1 &&
          n.firstElementChild &&
          n.firstElementChild.childElementCount === 0 &&
          isBigMetricNumber(n.firstElementChild)
        ) {
          // skip; child will be caught
        }
        n = walker.nextNode();
      }
    };
    walk(main);
    return nodes;
  }

  function rememberBaseline(el) {
    if (!state.baselines.has(el)) {
      state.baselines.set(el, (el.textContent || '').trim());
    }
    return state.baselines.get(el);
  }

  function applyCampaignFilter() {
    const w = weight();
    const nodes = collectMetricNodes();
    nodes.forEach((el, i) => {
      const base = rememberBaseline(el);
      el.setAttribute('data-aside-campaign-num', '1');
      if (state.campaignId === 'all') {
        el.textContent = base;
        return;
      }
      const raw = base.replace(/,/g, '');
      const isPct = raw.endsWith('%');
      const num = parseFloat(raw);
      if (Number.isNaN(num)) return;
      let next = scaleInt(num, w, i + base.length);
      // percentages keep mild compression not zero
      if (isPct) next = Math.min(100, Math.max(1, next));
      el.textContent = isPct ? `${next}%` : String(next);
    });

    // Activity list: hide a subset when filtered for drill-in feel
    filterActivityItems();
    filterPriorityClients();
  }

  function filterActivityItems() {
    const items = Array.from(document.querySelectorAll('main [data-aside-activity-item]'));
    if (!items.length) {
      // tag if polish hasn't yet
      const h2 = Array.from(document.querySelectorAll('main h2')).find((h) => /Metrics Activity/i.test(h.textContent || ''));
      // no-op if not ready
    }
    const w = weight();
    const keepEvery = state.campaignId === 'all' ? 1 : Math.max(1, Math.round(1 / Math.max(w, 0.15)));
    items.forEach((el, i) => {
      if (state.campaignId === 'all') {
        // don't fight polish collapse — only clear campaign hide
        if (el.getAttribute('data-aside-campaign-hide') === '1') {
          el.removeAttribute('data-aside-campaign-hide');
          if (el.getAttribute('data-aside-hidden') !== '1') {
            el.style.removeProperty('display');
          }
        }
        return;
      }
      const hide = i % keepEvery !== 0;
      if (hide) {
        el.setAttribute('data-aside-campaign-hide', '1');
        el.style.setProperty('display', 'none', 'important');
      } else {
        el.removeAttribute('data-aside-campaign-hide');
        if (el.getAttribute('data-aside-hidden') !== '1') {
          el.style.removeProperty('display');
        }
      }
    });
  }

  function filterPriorityClients() {
    const h2 = Array.from(document.querySelectorAll('main h2')).find((h) => /Top Priority Clients/i.test(h.textContent || ''));
    if (!h2) return;
    // find list container near header
    let section = h2.closest('section') || h2.parentElement?.parentElement;
    if (!section) return;
    const cards = Array.from(section.querySelectorAll('[class*="border"], [class*="card"], li, article')).filter((el) => {
      const t = (el.textContent || '');
      return t.length > 10 && t.length < 400 && /@|Buyer|Seller|Client|%|priority/i.test(t);
    });
    // fallback: direct children rows
    const rows = cards.length ? cards : Array.from(section.children).slice(1);
    const w = weight();
    rows.forEach((el, i) => {
      if (state.campaignId === 'all') {
        el.style.removeProperty('display');
        el.removeAttribute('data-aside-campaign-hide');
        return;
      }
      const hide = i > 0 && (i % Math.max(1, Math.round(1 / Math.max(w, 0.2))) !== 0);
      if (hide) {
        el.setAttribute('data-aside-campaign-hide', '1');
        el.style.setProperty('display', 'none', 'important');
      } else {
        el.removeAttribute('data-aside-campaign-hide');
        el.style.removeProperty('display');
      }
    });
  }

  function boot() {
    ensureMount();
    // re-apply filter after React redraws numbers
    applyCampaignFilter();
  }

  function schedule() {
    boot();
    [120, 350, 700, 1200, 2200, 4000].forEach((ms) => setTimeout(boot, ms));
    if (!window.__asideCampaignObserver) {
      let t = null;
      window.__asideCampaignObserver = new MutationObserver(() => {
        if (t) clearTimeout(t);
        t = setTimeout(() => {
          ensureMount();
          // don't stomp skeleton / re-apply mid-load
          if (document.querySelector('main')?.getAttribute('data-aside-campaign-loading') === '1') return;
          applyCampaignFilter();
        }, 100);
      });
      const root = document.querySelector('main') || document.body;
      window.__asideCampaignObserver.observe(root, { childList: true, subtree: true });
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', schedule);
  else schedule();
})();
</script>

</body>
